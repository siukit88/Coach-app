<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kit Coach 團隊特訓大數據平台</title>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: block; text-align: center; color: #ffffff; }
        .phone-container { width: 100%; max-width: 412px; min-height: 100vh; background: #16161a; margin: 0 auto; position: relative; box-sizing: border-box; padding-bottom: 40px; text-align: left; }
        .header { background: #ff3366; padding: 25px 20px; }
        .header h1 { margin: 0; font-size: 22px; font-weight: bold; }
        .header p { margin: 5px 0 0 0; font-size: 13px; color: rgba(255,255,255,0.8); }
        .card { background: #22222b; margin: 15px; padding: 20px; border-radius: 8px; }
        .card h2 { margin: 0 0 15px 0; font-size: 16px; color: #ffffff; border-left: 4px solid #ff3366; padding-left: 8px; }
        .custom-form { display: flex; flex-direction: column; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; color: #aaaaaa; margin-bottom: 4px; }
        .native-input, .native-select { background: #16161a; border: 1px solid #ff3366; padding: 10px; color: #ffffff; font-size: 15px; border-radius: 6px; outline: none; box-sizing: border-box; }
        .native-input:focus, .native-select:focus { border-color: #00ffcc; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .multiselect-tag { background: #1d1d26; border: 1px solid #555566; padding: 8px 12px; color: #cccccc; font-size: 13px; border-radius: 20px; cursor: pointer; user-select: none; transition: all 0.2s ease; }
        .multiselect-tag.selected { background: rgba(0, 255, 204, 0.15); border-color: #00ffcc; color: #00ffcc; font-weight: bold; }
        
        .submit-btn { background: linear-gradient(135deg, #ff3366, #ff5e62); border: none; color: #ffffff; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .submit-btn:disabled { opacity: 0.5; }
        .filter-zone { display: flex; gap: 10px; margin-top: 10px; }
        .filter-select { flex: 1; background: #2a2a35; border: 1px solid #ff3366; color: #ffffff; padding: 8px; border-radius: 4px; font-size: 14px; outline: none; }
        .data-row { margin: 10px 0; font-size: 14px; color: #aaaaaa; line-height: 1.5; }
        .data-val { color: #ffffff; font-weight: bold; float: right; text-align: right; max-width: 60%; }
        .clear { clear: both; }
        .bar-bg { background: #3a3a4a; width: 100%; height: 12px; border-radius: 6px; margin-top: 8px; overflow: hidden; }
        .bar-fill { background: #00ffcc; height: 100%; width: 0%; transition: width 0.6s ease, background-color 0.6s ease; }
        .input-box { background: #16161a; border: 1px solid #ff3366; padding: 10px; width: 100%; box-sizing: border-box; color: #ffffff; font-size: 16px; border-radius: 4px; margin-top: 10px; text-align: center; }
        .comment-box { margin: 15px; padding: 20px; border-radius: 8px; border: 1px solid #ff3366; background: #2d1a1e; }
        .comment-box.unlocked { border-color: #00ffcc; background: #1b2a22; }
        .comment-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .comment-text { font-size: 13px; line-height: 1.6; }
        .hidden-group { display: none; margin-top: 5px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <h1>Kit Coach 團隊特訓大數據平台</h1>
        <p>慢慢跑團 遠程智慧特訓平台 v7.6 (即時防呆版)</p>
    </div>

    <div class="card">
        <h2>📝 步驟一：學員功課手動回報</h2>
        <form id="coach-native-form" class="custom-form">
            
            <div class="form-group">
                <label>學員姓名</label>
                <select id="form-name-select" class="native-select" required>
                    <option value="">請選擇跑手...</option>
                    <option value="Kit Coach">Kit Coach</option>
                    <option value="Karis">Karis</option>
                    <option value="跑手A">跑手A</option>
                </select>
            </div>

            <div class="form-group">
                <label>特訓週數</label>
                <select id="form-week-select" class="native-select" required>
                    <option value="">請選擇週數...</option>
                    <option value="1">第 1 週</option>
                    <option value="2">第 2 週</option>
                    <option value="3">第 3 週</option>
                </select>
            </div>

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>長跑距離 (km)</label>
                    <input type="number" id="form-distance" class="native-input" placeholder="e.g. 34.14" step="0.01" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>爬升海拔 (米)</label>
                    <input type="number" id="form-climb" class="native-input" placeholder="e.g. 2220" required>
                </div>
            </div>
            
            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>長跑時間</label>
                    <input type="text" id="form-time" class="native-input" placeholder="e.g. 06:48:21" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>平均步頻 (spm)</label>
                    <input type="number" id="form-cadence" class="native-input" placeholder="e.g. 175" required>
                </div>
            </div>

            <div class="form-group">
                <label>平均心率 (bpm)</label>
                <input type="number" id="form-hr" class="native-input" placeholder="e.g. 142" required>
            </div>

            <div class="form-group">
                <label>身體風險 (可複選體感)</label>
                <div class="tag-container" id="risk-tags-zone">
                    <div class="multiselect-tag selected" data-value="良好 (狀態平穩)">良好 (狀態平穩)</div>
                    <div class="multiselect-tag" data-value="過度疲勞">過度疲勞</div>
                    <div class="multiselect-tag" data-value="睡眠不足">睡眠不足</div>
                </div>
            </div>

            <div class="form-group">
                <label>環境天氣</label>
                <div class="tag-container" id="weather-tags-zone">
                    <div class="multiselect-tag selected" data-value="天氣涼爽舒適">天氣涼爽舒適</div>
                    <div class="multiselect-tag" data-value="香港高濕脫水">香港高濕脫水</div>
                </div>
            </div>

            <div class="form-group">
                <label>補給問題</label>
                <div class="tag-container" id="supply-tags-zone">
                    <div class="multiselect-tag selected" data-value="補給吸收良好">補給吸收良好</div>
                    <div class="multiselect-tag" data-value="補水不足">補水不足</div>
                </div>
            </div>
            
            <button type="submit" id="submit-btn" class="submit-btn">本地同步上傳 (即時刷新測試)</button>
        </form>
    </div>

    <div class="card">
        <h2>📊 步驟二：智慧數據看板 (支援本地與歷史紀錄)</h2>
        <div class="filter-zone">
            <select id="filter-name" class="filter-select">
                <option value="Kit Coach">Kit Coach</option>
                <option value="Karis">Karis</option>
            </select>
            <select id="filter-week" class="filter-select">
                <option value="1">第 1 週</option>
                <option value="2">第 2 週</option>
            </select>
        </div>
        <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 15px 0;">
        <div class="data-row">訓練日期 <span id="val-date" class="data-val">--</span></div>
        <div class="data-row">長跑距離 <span id="val-distance" class="data-val">請先提交上方數據</span></div>
        <div class="data-row">爬升海拔 <span id="val-climb" class="data-val">--</span></div>
        <div class="data-row">長跑時間 <span id="val-time" class="data-val">--</span></div>
        <div class="data-row" style="color: #00ffcc; font-weight: bold;">每小時耗力指數 (EPH) <span id="val-eph" class="data-val" style="color: #00ffcc;">--</span></div>
        <div class="data-row">平均步頻 <span id="val-cadence" class="data-val">--</span></div>
        <div class="data-row" style="margin-top: 15px;">
            <div>平均心率 <span id="val-hr" class="data-val">--</span></div>
            <div class="clear"></div>
            <div class="bar-bg"><div id="hr-bar" class="bar-fill"></div></div>
        </div>
        <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 15px 0;">
        <div class="data-row">身體風險 <span id="val-risk" class="data-val">--</span></div>
        <div class="data-row">環境天氣 <span id="val-weather" class="data-val">--</span></div>
        <div class="data-row">補給問題 <span id="val-supply" class="data-val">--</span></div>
    </div>

    <div class="card">
        <h2>🔐 步驟三：解鎖教練專屬週方針</h2>
        <input type="password" id="pwd-input" class="input-box" placeholder="點擊打入密碼解鎖評語" maxlength="4">
    </div>

    <div id="lock-zone" class="comment-box">
        <div id="lock-title" class="comment-title" style="color: #ff4d4d;">🔒 遠程評語尚未解鎖</div>
        <div id="lock-content" class="comment-text" style="color: rgba(255,255,255,0.6);">
            【系統提示】：請選擇跑手與週數，並打入密碼解鎖本週核心特訓戰術方針！
        </div>
    </div>
</div>

<script>
    let allRecords = [
        { timestamp: "2026/06/27", name: "Kit Coach", week: "1", distance: "34.14", time: "06:48:21", cadence: "175", hr: "142", risk: "良好 (狀態平穩)", weather: "天氣涼爽舒適", supply: "補給吸收良好", climb: "2220" }
    ]; 

    document.querySelectorAll('.tag-container').forEach(container => {
        container.addEventListener('click', function(e) {
            if (e.target.classList.contains('multiselect-tag')) {
                container.querySelectorAll('.multiselect-tag').forEach(t => t.classList.remove('selected'));
                e.target.classList.add('selected');
            }
        });
    });

    document.getElementById('coach-native-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const finalName = document.getElementById('form-name-select').value;
        const finalWeek = document.getElementById('form-week-select').value;
        if(!finalName || !finalWeek) { alert("請選好名字同週數！"); return; }

        let record = { 
            timestamp: new Date().toLocaleDateString(), name: finalName, week: finalWeek, 
            distance: document.getElementById('form-distance').value, 
            time: document.getElementById('form-time').value, 
            cadence: document.getElementById('form-cadence').value, 
            hr: document.getElementById('form-hr').value, 
            risk: "良好 (狀態平穩)", weather: "天氣涼爽舒適", supply: "補給吸收良好",
            climb: document.getElementById('form-climb').value
        };
        
        allRecords.push(record);
        alert('🎉 本地數據注入成功！看板已同步更新！');
        
        document.getElementById('filter-name').value = finalName;
        document.getElementById('filter-week').value = finalWeek;
        updateDisplay(finalName, finalWeek);
    });

    function timeStringToHours(timeStr) {
        if (!timeStr || !timeStr.includes(':')) return 0;
        const parts = timeStr.split(':').map(Number);
        return parts.length === 3 ? parts[0] + (parts[1] / 60) + (parts[2] / 3600) : 0;
    }

    function updateDisplay(selectedName, selectedWeek) {
        const matched = allRecords.find(r => r.name === selectedName && r.week === selectedWeek);
        if (matched) {
            document.getElementById('val-date').innerText = matched.timestamp;
            document.getElementById('val-distance').innerText = matched.distance + " km";
            document.getElementById('val-climb').innerText = matched.climb + " 米";
            document.getElementById('val-time').innerText = matched.time;
            document.getElementById('val-cadence').innerText = matched.cadence + " spm";
            
            const distNum = parseFloat(matched.distance) || 0;
            const climbNum = parseFloat(matched.climb) || 0;
            const hoursNum = timeStringToHours(matched.time);
            
            if (hoursNum > 0) {
                const ephCalc = (distNum + (climbNum / 100)) / hoursNum;
                document.getElementById('val-eph').innerText = ephCalc.toFixed(2) + " EP/小時";
            } else {
                document.getElementById('val-eph').innerText = "--";
            }
            
            const hrNum = parseInt(matched.hr); document.getElementById('val-hr').innerText = matched.hr + " bpm";
            const hrBar = document.getElementById('hr-bar'); hrBar.style.width = Math.min(100, (hrNum/200)*100) + "%";
            hrBar.style.backgroundColor = hrNum <= 145 ? "#00ffcc" : "#ff9900";
            
            document.getElementById('val-risk').innerText = matched.risk; 
            document.getElementById('val-weather').innerText = matched.weather;
            document.getElementById('val-supply').innerText = matched.supply;
        } else {
            document.getElementById('val-distance').innerText = "無歷史紀錄";
        }
    }

    document.getElementById('filter-name').addEventListener('change', (e) => { updateDisplay(e.target.value, document.getElementById('filter-week').value); });
    document.getElementById('filter-week').addEventListener('change', (e) => { updateDisplay(document.getElementById('filter-name').value, e.target.value); });
    
    document.getElementById('pwd-input').addEventListener('input', (e) => {
        if (parseInt(e.target.value) + 888 === 2122) {
            document.getElementById('lock-zone').className = "comment-box unlocked";
            document.getElementById('lock-title').innerText = "🔓 Kit Coach 智能方針解鎖成功！";
            document.getElementById('lock-title').style.color = "#00ffcc";
            document.getElementById('lock-content').innerText = "對照當週大數據指標與正宗 EPH 推進效率評估，耐力配速策略運作正常。週間維持低內耗 Zone 2 特訓，嚴防過度疲勞！";
            document.getElementById('lock-content').style.color = "#ffffff";
        }
    });

    updateDisplay("Kit Coach", "1");
</script>
</body>
</html>
