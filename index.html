<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kit Coach 團隊特訓大數據平台 (極簡版)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; color: #ffffff; }
        .phone-container { width: 100%; max-width: 412px; min-height: 100vh; background: #16161a; margin: 0 auto; padding-bottom: 40px; text-align: left; box-sizing: border-box; }
        .header { background: #ff3366; padding: 25px 20px; }
        .header h1 { margin: 0; font-size: 22px; font-weight: bold; }
        .header p { margin: 5px 0 0 0; font-size: 13px; color: rgba(255,255,255,0.8); }
        .card { background: #22222b; margin: 15px; padding: 20px; border-radius: 8px; }
        .card h2 { margin: 0 0 15px 0; font-size: 16px; color: #ffffff; border-left: 4px solid #ff3366; padding-left: 8px; }
        .custom-form { display: flex; flex-direction: column; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; color: #aaaaaa; margin-bottom: 4px; }
        .native-input, .native-select { background: #16161a; border: 1px solid #ff3366; padding: 10px; color: #ffffff; font-size: 15px; border-radius: 6px; outline: none; box-sizing: border-box; width: 100%; }
        .submit-btn { background: linear-gradient(135deg, #ff3366, #ff5e62); border: none; color: #ffffff; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; text-align: center; width: 100%; box-sizing: border-box; }
        .filter-zone { display: flex; gap: 10px; margin-top: 10px; }
        .filter-select { flex: 1; background: #2a2a35; border: 1px solid #ff3366; color: #ffffff; padding: 8px; border-radius: 4px; font-size: 14px; outline: none; }
        .data-row { margin: 10px 0; font-size: 14px; color: #aaaaaa; line-height: 1.5; }
        .data-val { color: #ffffff; font-weight: bold; float: right; text-align: right; max-width: 60%; }
        .clear { clear: both; }
        .hidden-group { display: block; margin-top: 5px; }
    </style>
</head>
<body>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<div class="phone-container">
    <div class="header">
        <h1>Kit Coach 團隊特訓大數據平台</h1>
        <p>慢慢跑團 遠程智慧特訓平台 v28.5 (新網址極簡復活版)</p>
    </div>

    <div class="card">
        <h2>📊 步驟一：上傳今日特訓功課</h2>
        
        <form id="coachForm" action="https://docs.google.com/forms/d/e/1FAIpQLSfCsCEhAqEvFlrSLPDdGMGl3hAMXP7nURwnVjLHQ1DfSDwZTg/formResponse" method="POST" target="hidden_iframe" class="custom-form">
            
            <div class="form-group">
                <label>學員姓名</label>
                <select id="form-name-select" class="native-select"></select>
                <div id="new-name-zone" class="hidden-group">
                    <input type="text" id="form-name-custom" class="native-input" placeholder="請輸入新跑手姓名">
                </div>
                <input type="hidden" name="entry.477574654" id="google-name">
            </div>

            <div class="form-group">
                <label>特訓週數</label>
                <select id="form-week-select" class="native-select"></select>
                <div id="new-week-zone" class="hidden-group">
                    <input type="text" id="form-week-custom" class="native-input" placeholder="e.g. 14">
                </div>
                <input type="hidden" name="entry.1489498214" id="google-week">
            </div>

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>長跑距離 (km)</label>
                    <input type="number" name="entry.148761576" id="form-distance" class="native-input" placeholder="e.g. 34.14" step="0.01">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>爬升海拔 (米)</label>
                    <input type="number" name="entry.1312042737" id="form-climb" class="native-input" placeholder="e.g. 2220">
                </div>
            </div>
            
            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>長跑時間</label>
                    <input type="text" name="entry.1180292056" id="form-time" class="native-input" placeholder="e.g. 06:48:21">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>平均步頻 (spm)</label>
                    <input type="number" name="entry.1706083544" id="form-cadence" class="native-input" placeholder="e.g. 175">
                </div>
            </div>

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>平均心率 (bpm)</label>
                    <input type="number" name="entry.1835781605" id="form-hr" class="native-input" placeholder="e.g. 142">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>平均步距 (m)</label>
                    <input type="number" name="entry.772436490" id="form-stride" class="native-input" placeholder="e.g. 1.15" step="0.01">
                </div>
            </div>

            <div class="form-group">
                <label>身體風險 (體感描述)</label>
                <input type="text" name="entry.1920350515" id="form-risk" class="native-input" value="良好（狀態平穩，無傷痛）">
            </div>

            <div class="form-group">
                <label>環境天氣</label>
                <input type="text" name="entry.1919206278" id="form-weather" class="native-input" value="正常（天氣涼爽 / 室內冷氣 / 體感舒適）">
            </div>

            <div class="form-group">
                <label>補給問題</label>
                <input type="text" name="entry.53803926" id="form-supply" class="native-input" value="正常（水份、能量膠與食物吸收良好）">
            </div>
            
            <button type="button" onclick="submitDataDirectly()" id="submitBtnText" class="submit-btn">確認並直接提交上傳 ➔</button>
        </form>
    </div>

    <div class="card">
        <h2>📊 步驟二：智慧數據看板 (雲端同步讀取)</h2>
        <div class="filter-zone">
            <select id="filter-name" class="filter-select"><option value="">選擇跑手...</option></select>
            <select id="filter-week" class="filter-select"><option value="">選擇週數...</option></select>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 15px 0;">
        <div class="data-row">訓練日期 <span id="val-date" class="data-val">--</span></div>
        <div class="data-row">長跑距離 <span id="val-distance" class="data-val">請選取上方篩選數據</span></div>
        <div class="data-row">爬升海拔 <span id="val-climb" class="data-val">--</span></div>
        <div class="data-row">長跑時間 <span id="val-time" class="data-val">--</span></div>
        <div class="data-row" style="color: #00ffcc; font-weight: bold;">正宗耗力指數 (EPH) <span id="val-eph" class="data-val" style="color: #00ffcc;">--</span></div>
        <div class="data-row">平均步頻 <span id="val-cadence" class="data-val">--</span></div>
        <div class="data-row">平均步距 <span id="val-stride" class="data-val">--</span></div>
        <div class="data-row">平均心率 <span id="val-hr" class="data-val">--</span></div>
        <div class="data-row" style="margin-top: 15px;"></div>
        <div class="data-row">身體風險 <span id="val-risk" class="data-val">--</span></div>
        <div class="data-row">環境天氣 <span id="val-weather" class="data-val">--</span></div>
        <div class="data-row">補給問題 <span id="val-supply" class="data-val">--</span></div>
    </div>
</div>

<script>
    // 💡 鎖定教練提供的最新 Excel 指定分頁網址
    const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxdxSecRK-c5JnXNdMqt__8HjZI1mZFP8gP7YF2MSGDQRfj_fheZZnDRih-95CRCbnN3QG7XrJMthY/pub?gid=375017450&single=true&output=csv";
    let allRecords = []; 
    let submitted = false;

    function submitDataDirectly() {
        const nameSelect = document.getElementById('form-name-select').value;
        const finalName = nameSelect === "__NEW__" ? document.getElementById('form-name-custom').value.trim() : nameSelect;
        const weekSelect = document.getElementById('form-week-select').value;
        const finalWeek = weekSelect === "__NEW__" ? document.getElementById('form-week-custom').value.trim() : weekSelect;
        if(!finalName || !finalWeek) { alert("請填寫姓名與週數！"); return; }

        document.getElementById('google-name').value = finalName;
        document.getElementById('google-week').value = finalWeek;

        submitted = true;
        document.getElementById('submitBtnText').innerText = "正在傳輸至 Excel...";
        document.getElementById('coachForm').submit();
    }

    function onUploadSuccess() {
        alert("✅ 功課已成功上傳 Excel！");
        submitted = false;
        document.getElementById('submitBtnText').innerText = "確認並直接提交上傳 ➔";
        fetchAllData();
    }

    function timeStringToHours(timeStr) {
        if (!timeStr || !timeStr.includes(':')) return 0;
        const parts = timeStr.split(':').map(Number);
        return parts.length === 3 ? parts[0] + (parts[1] / 60) + (parts[2] / 3600) : 0;
    }

    // 採用最單純的純文字換行 CSV 解析，杜絕任何外部庫相依性錯誤
    function parseStandardCSV(csvText) {
        let lines = []; let currentLine = []; let currentCell = ''; let inQuotes = false;
        let normalized = csvText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        for (let i = 0; i < normalized.length; i++) {
            let c = normalized[i];
            if (c === '"') { inQuotes = !inQuotes; }
            else if (c === ',' && !inQuotes) { currentLine.push(currentCell.trim()); currentCell = ''; }
            else if (c === '\n' && !inQuotes) { currentLine.push(currentCell.trim()); lines.push(currentLine); currentLine = []; currentCell = ''; }
            else { currentCell += c; }
        }
        if (currentCell || currentLine.length > 0) { currentLine.push(currentCell.trim()); lines.push(currentLine); }
        return lines;
    }

    async function fetchAllData() {
        try {
            const response = await fetch(googleSheetCsvUrl + "&cachebust=" + new Date().getTime());
            const data = await response.text();
            const lines = parseStandardCSV(data);
            if(!lines || lines.length <= 1) { initSelectsWithNewOption(); return; }

            const headers = lines[0];
            let idxName = headers.findIndex(h => h.includes("姓名") || h.includes("跑手") || h.includes("Name") || h.includes("學員"));
            let idxWeek = headers.findIndex(h => h.includes("週") || h.includes("Week"));
            let idxDist = headers.findIndex(h => h.includes("距離") || h.includes("Distance") || h.includes("km"));
            let idxClimb = headers.findIndex(h => h.includes("爬升") || h.includes("Climb") || h.includes("海拔"));
            let idxTime = headers.findIndex(h => h.includes("時間") || h.includes("Time"));
            let idxCadence = headers.findIndex(h => h.includes("步頻") || h.includes("Cadence"));
            let idxHr = headers.findIndex(h => h.includes("心率") || h.includes("HR"));
            let idxStride = headers.findIndex(h => h.includes("步距") || h.includes("Stride"));
            let idxRisk = headers.findIndex(h => h.includes("風險") || h.includes("身體"));
            let idxWeather = headers.findIndex(h => h.includes("天氣") || h.includes("環境"));
            let idxSupply = headers.findIndex(h => h.includes("補給") || h.includes("Supply"));

            if(idxName === -1) idxName = 1; if(idxWeek === -1) idxWeek = 2; if(idxDist === -1) idxDist = 3; if(idxClimb === -1) idxClimb = 4;
            if(idxTime === -1) idxTime = 5; if(idxCadence === -1) idxCadence = 6; if(idxHr === -1) idxHr = 7; if(idxStride === -1) idxStride = 8;

            allRecords = []; let names = new Set(); let weeks = new Set();
            for(let i = 1; i < lines.length; i++) {
                let row = lines[i];
                if(row && row.length > Math.max(idxName, idxWeek) && row[idxName] && row[idxName].trim() !== "" && row[idxName] !== "學員姓名") { 
                    allRecords.push({ 
                        timestamp: row[0]||"--", name: row[idxName], week: row[idxWeek], distance: row[idxDist]||"0", 
                        climb: row[idxClimb]||"0", time: row[idxTime]||"--", cadence: row[idxCadence]||"0", 
                        hr: row[idxHr]||"0", stride: row[idxStride]||"0", risk: row[idxRisk]||"良好", 
                        weather: row[idxWeather]||"正常", supply: row[idxSupply]||"正常" 
                    });
                    names.add(row[idxName]); weeks.add(row[idxWeek]);
                }
            }

            const formNameSelect = document.getElementById('form-name-select');
            const formWeekSelect = document.getElementById('form-week-select');
            const nameSelect = document.getElementById('filter-name'); 
            const weekSelect = document.getElementById('filter-week');

            if (names.size === 0) {
                initSelectsWithNewOption();
            } else {
                formNameSelect.innerHTML = '<option value="">請選擇名字...</option>';
                names.forEach(n => { formNameSelect.innerHTML += `<option value="${n}">${n}</option>`; });
                formNameSelect.innerHTML += '<option value="__NEW__" selected>+ 新增新跑手...</option>';

                formWeekSelect.innerHTML = '<option value="">請選擇週數...</option>';
                Array.from(weeks).sort().forEach(w => { formWeekSelect.innerHTML += `<option value="${w}">${w}</option>`; });
                formWeekSelect.innerHTML += '<option value="__NEW__" selected>+ 新增特訓週數...</option>';

                nameSelect.innerHTML = '<option value="">選擇跑手...</option>';
                names.forEach(n => { nameSelect.innerHTML += `<option value="${n}">${n}</option>`; });
                weekSelect.innerHTML = '<option value="">選擇週數...</option>';
                Array.from(weeks).sort().forEach(w => { weekSelect.innerHTML += `<option value="${w}">${w}</option>`; });
                
                if(allRecords && allRecords.length > 0) { 
                    const last = allRecords[allRecords.length - 1]; 
                    if(last) { nameSelect.value = last.name; weekSelect.value = last.week; updateDisplay(last.name, last.week); }
                }
            }
        } catch (error) { initSelectsWithNewOption(); }
    }

    function initSelectsWithNewOption() {
        document.getElementById('form-name-select').innerHTML = '<option value="__NEW__" selected>+ 新增新跑手...</option>';
        document.getElementById('form-week-select').innerHTML = '<option value="__NEW__" selected>+ 新增特訓週數...</option>';
        document.getElementById('filter-name').innerHTML = '<option value="">暫無歷史紀錄</option>';
        document.getElementById('filter-week').innerHTML = '<option value="">暫無歷史紀錄</option>';
    }

    function updateDisplay(selectedName, selectedWeek) {
        if(!allRecords || allRecords.length === 0) return;
        const matched = allRecords.find(r => r.name === selectedName && r.week === selectedWeek);
        if (matched) {
            document.getElementById('val-date').innerText = matched.timestamp.split(' ')[0] || "--"; 
            document.getElementById('val-distance').innerText = matched.distance + " km"; 
            document.getElementById('val-climb').innerText = matched.climb + " 米"; 
            document.getElementById('val-time').innerText = matched.time; 
            document.getElementById('val-cadence').innerText = matched.cadence + " spm"; 
            document.getElementById('val-stride').innerText = matched.stride + " m";
            document.getElementById('val-hr').innerText = matched.hr + " bpm";
            document.getElementById('val-risk').innerText = matched.risk; 
            document.getElementById('val-weather').innerText = matched.weather; 
            document.getElementById('val-supply').innerText = matched.supply;
            
            const distNum = parseFloat(matched.distance) || 0; 
            const climbNum = parseFloat(matched.climb) || 0; 
            const hoursNum = timeStringToHours(matched.time);
            if (hoursNum > 0) { 
                document.getElementById('val-eph').innerText = ((distNum + (climbNum / 100)) / hoursNum).toFixed(2) + " EP/小時"; 
            } else { 
                document.getElementById('val-eph').innerText = "--"; 
            }
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('hidden_iframe').onload = function() { if (submitted) { onUploadSuccess(); } };
        document.getElementById('filter-name').addEventListener('change', (e) => { updateDisplay(e.target.value, document.getElementById('filter-week').value); });
        document.getElementById('filter-week').addEventListener('change', (e) => { updateDisplay(document.getElementById('filter-name').value, e.target.value); });
        
        document.getElementById('form-name-select').addEventListener('change', function(e) {
            const zone = document.getElementById('new-name-zone');
            if(zone) zone.style.display = e.target.value === "__NEW__" ? "block" : "none";
        });
        document.getElementById('form-week-select').addEventListener('change', function(e) {
            const zone = document.getElementById('new-week-zone');
            if(zone) zone.style.display = e.target.value === "__NEW__" ? "block" : "none";
        });

        fetchAllData();
    });
</script>
</body>
</html>
