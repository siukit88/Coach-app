<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ki Coach 智慧特訓大數據平台</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: block; text-align: center;
            color: #ffffff;
        }
        .phone-container {
            width: 100%; max-width: 412px; min-height: 100vh;
            background: #16161a; margin: 0 auto;
            position: relative; box-sizing: border-box;
            padding-bottom: 40px; text-align: left;
        }
        .header { background: #ff3366; padding: 25px 20px; }
        .header h1 { margin: 0; font-size: 22px; font-weight: bold; }
        .header p { margin: 5px 0 0 0; font-size: 13px; color: rgba(255,255,255,0.8); }
        .card { background: #22222b; margin: 15px; padding: 20px; border-radius: 8px; }
        .card h2 { margin: 0 0 15px 0; font-size: 16px; color: #ffffff; border-left: 4px solid #ff3366; padding-left: 8px; }
        .form-wrapper { width: 100%; height: 450px; border: none; border-radius: 8px; background: #ffffff; overflow: hidden; }
        
        /* 篩選器樣式 */
        .filter-zone { display: flex; gap: 10px; margin-top: 10px; }
        .filter-select { flex: 1; background: #2a2a35; border: 1px solid #ff3366; color: #ffffff; padding: 8px; border-radius: 4px; font-size: 14px; outline: none; }
        
        .data-row { margin: 10px 0; font-size: 14px; color: #aaaaaa; line-height: 1.5; }
        .data-val { color: #ffffff; font-weight: bold; float: right; }
        .clear { clear: both; }
        
        /* 動態心率條 */
        .bar-bg { background: #3a3a4a; width: 100%; height: 12px; border-radius: 6px; margin-top: 8px; overflow: hidden; }
        .bar-fill { background: #00ffcc; height: 100%; width: 0%; transition: width 0.6s ease, background-color 0.6s ease; }
        
        .input-box { background: #16161a; border: 1px solid #ff3366; padding: 10px; width: 100%; box-sizing: border-box; color: #ffffff; font-size: 16px; border-radius: 4px; margin-top: 10px; text-align: center; }
        .comment-box { margin: 15px; padding: 20px; border-radius: 8px; border: 1px solid #ff3366; background: #2d1a1e; }
        .comment-box.unlocked { border-color: #00ffcc; background: #1b2a22; }
        .comment-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .comment-text { font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <h1>Ki Coach 特訓大數據平台</h1>
        <p>毅行者遠程智慧特訓平台 v3.5</p>
    </div>

    <div class="card">
        <h2>📝 步驟一：學員功課手動回報</h2>
        <iframe id="google-form" class="form-wrapper" src="">載入中...</iframe>
    </div>

    <div class="card">
        <h2>📊 步驟二：智慧數據看板 (支援歷史重睇)</h2>
        
        <div class="filter-zone">
            <select id="filter-name" class="filter-select"><option value="">選擇跑手...</option></select>
            <select id="filter-week" class="filter-select"><option value="">選擇週數...</option></select>
        </div>
        <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 15px 0;">

        <div class="data-row">訓練日期 <span id="val-date" class="data-val">--</span></div>
        <div class="data-row">長跑距離 <span id="val-distance" class="data-val">請先選取上方篩選</span></div>
        <div class="data-row">長跑時間 <span id="val-time" class="data-val">--</span></div>
        <div class="data-row">平均步頻 <span id="val-cadence" class="data-val">--</span></div>
        <div class="data-row" style="margin-top: 15px;">
            <div>平均心率 <span id="val-hr" class="data-val">--</span></div>
            <div class="clear"></div>
            <div class="bar-bg"><div id="hr-bar" class="bar-fill"></div></div>
        </div>
        <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 15px 0;">
        <div class="data-row">身體風險 <span id="val-risk" class="data-val">--</span></div>
        <div class="data-row">環境天氣 <span id="val-weather" class="data-val">--</span></div>
    </div>

    <div class="card">
        <h2>🔐 步驟三：解鎖教練專屬週方針</h2>
        <input type="password" id="pwd-input" class="input-box" placeholder="點擊打入密碼解鎖評語" maxlength="4">
    </div>

    <div id="lock-zone" class="comment-box">
        <div id="lock-title" class="comment-title" style="color: #ff4d4d;">🔒 遠程評語尚未解鎖</div>
        <div id="lock-content" class="comment-text" style="color: rgba(255,255,255,0.6);">
            【系統提示】：請選擇跑手與週數，並打入密碼解鎖本週毅行者核心特訓戰術方針！
        </div>
    </div>
</div>

<script>
    // 💡 已完美綁定你提供的真實連結
    const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdV_jDZAewz9DRibVGR4d00JKYSY_HG3H2rqnhs8DP-qbOpgg/viewform?embedded=true"; 
    const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0ExUDp5FdOBZXnrLXb1t7cRAsYARjjKuaZscM3KdhhW24oqsSKuGMDHf4dYqT3jknHGYxM3oTPLNf/pub?gid=586498673&single=true&output=csv";

    document.getElementById('google-form').src = googleFormUrl;

    let allRecords = []; 

    // 全量數據抓取與精確對位
    async function fetchAllData() {
        try {
            const response = await fetch(googleSheetCsvUrl);
            const data = await response.text();
            
            // 解析 CSV 行（考慮到引號引起來的逗號中文字）
            const lines = data.split('\n').map(line => {
                // 簡易 CSV 逗號分割，若有複雜引號可以用正規式，這裡對應標準導出
                return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            });
            
            allRecords = [];
            let names = new Set();
            let weeks = new Set();

            // 循環讀取每列 (i=1 跳過表頭)
            for(let i = 1; i < lines.length; i++) {
                let row = lines[i];
                if(row && row.length > 5 && row[1]) { 
                    // 清除引號文字包裹
                    const clean = (val) => val ? val.replace(/^"|"$/g, '').trim() : "--";
                    
                    let record = {
                        timestamp: clean(row[0]),     // A: 時間戳記
                        name: clean(row[1]),          // B: 學員姓名
                        week: clean(row[2]),          // C: 特訓週數
                        distance: clean(row[3]),      // D: 長跑距離
                        time: clean(row[4]),          // E: 長跑時間
                        cadence: clean(row[5]),       // F: 平均步頻
                        hr: clean(row[6]),            // G: 平均心率
                        risk: clean(row[7]),          // H: 身體風險
                        weather: clean(row[8])        // I: 環境天氣
                    };
                    allRecords.push(record);
                    names.add(record.name);
                    weeks.add(record.week);
                }
            }

            // 生成下拉選單
            const nameSelect = document.getElementById('filter-name');
            nameSelect.innerHTML = '<option value="">選擇跑手...</option>';
            names.forEach(n => { nameSelect.innerHTML += `<option value="${n}">${n}</option>`; });

            const weekSelect = document.getElementById('filter-week');
            weekSelect.innerHTML = '<option value="">選擇週數...</option>';
            Array.from(weeks).sort().forEach(w => { weekSelect.innerHTML += `<option value="${w}">${w}</option>`; });

            // 預設全自動選取最新一筆提交紀錄
            if(allRecords.length > 0) {
                const last = allRecords[allRecords.length - 1];
                nameSelect.value = last.name;
                weekSelect.value = last.week;
                updateDisplay(last.name, last.week);
            }

        } catch (error) {
            console.error("數據加載失敗:", error);
        }
    }

    // 核心數據重新對位刷新
    function updateDisplay(selectedName, selectedWeek) {
        const matched = allRecords.find(r => r.name === selectedName && r.week === selectedWeek);
        
        if (matched) {
            // 解析日期
            document.getElementById('val-date').innerText = matched.timestamp.split(' ')[0] || "--";
            document.getElementById('val-distance').innerText = matched.distance + " km";
            document.getElementById('val-time').innerText = matched.time;
            
            // 步頻高於 180 綠色大剔號
            const cadNum = parseInt(matched.cadence);
            if(cadNum >= 180) {
                document.getElementById('val-cadence').innerHTML = `${matched.cadence} spm <span style="color:#00ffcc; font-size:12px;">(✓ 高效)</span>`;
            } else {
                document.getElementById('val-cadence').innerText = matched.cadence + " spm";
            }
            
            // 心率條百分比 (滿分 200)
            const hrNum = parseInt(matched.hr);
            document.getElementById('val-hr').innerText = matched.hr + " bpm";
            const hrBar = document.getElementById('hr-bar');
            
            let pct = Math.min(100, Math.max(10, (hrNum / 200) * 100));
            hrBar.style.width = pct + "%";
            
            // Zone 2 內耗顏色判定
            if(hrNum <= 145) {
                hrBar.style.backgroundColor = "#00ffcc";
            } else {
                hrBar.style.backgroundColor = "#ff9900";
            }
            
            document.getElementById('val-risk').innerText = matched.risk;
            document.getElementById('val-weather').innerText = matched.weather;
        } else {
            document.getElementById('val-date').innerText = "--";
            document.getElementById('val-distance').innerText = "無歷史紀錄";
            document.getElementById('val-time').innerText = "--";
            document.getElementById('val-cadence').innerText = "--";
            document.getElementById('val-hr').innerText = "--";
            document.getElementById('hr-bar').style.width = "0%";
            document.getElementById('val-risk').innerText = "--";
            document.getElementById('val-weather').innerText = "--";
        }
    }

    // 監聽下拉選單
    document.getElementById('filter-name').addEventListener('change', (e) => {
        updateDisplay(e.target.value, document.getElementById('filter-week').value);
    });
    document.getElementById('filter-week').addEventListener('change', (e) => {
        updateDisplay(document.getElementById('filter-name').value, e.target.value);
    });

    // 密碼解鎖評語邏輯 (密碼 1234)
    const pwdInput = document.getElementById('pwd-input');
    const lockZone = document.getElementById('lock-zone');
    const lockTitle = document.getElementById('lock-title');
    const lockContent = document.getElementById('lock-content');

    pwdInput.addEventListener('input', (e) => {
        const val = e.target.value;
        const currentName = document.getElementById('filter-name').value || "學員";
        const currentWeek = document.getElementById('filter-week').value || "當週";

        if (parseInt(val) + 888 === 2122) { 
            lockZone.className = "comment-box unlocked";
            lockTitle.innerText = `🔓 Ki Coach 對 [${currentName}] ${currentWeek} 戰術方針：`;
            lockTitle.style.color = "#00ffcc";
            lockContent.style.color = "#ffffff";
            lockContent.innerText = `根據 ${currentName} 在 ${currentWeek} 提交的歷史指標，平均步頻與心率表現十分穩定，合乎毅行者低內耗配速戰術。目前傷痛風險控制良好。下週拉量期繼續加碼，請督促隊員密切監測夜間靜止心率，嚴防過度疲勞！`;
        } else {
            lockZone.className = "comment-box";
            lockTitle.innerText = "🔒 遠程評語尚未解鎖";
            lockTitle.style.color = "#ff4d4d";
            lockContent.style.color = "rgba(255,255,255,0.6)";
            lockContent.innerText = "【系統提示】：請選擇跑手與週數，並打入密碼解鎖本週毅行者核心特訓戰術方針！";
        }
    });

    // 啟動全量大數據加載
    fetchAllData();
</script>

</body>
</html>
