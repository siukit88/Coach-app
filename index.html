<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kit Coach 團隊特訓智慧數據看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; color: #ffffff; }
        .phone-container { width: 100%; max-width: 412px; min-height: 100vh; background: #16161a; margin: 0 auto; padding-bottom: 40px; text-align: left; box-sizing: border-box; }
        .header { background: #ff3366; padding: 25px 20px; }
        .header h1 { margin: 0; font-size: 22px; font-weight: bold; }
        .header p { margin: 5px 0 0 0; font-size: 13px; color: rgba(255,255,255,0.8); }
        .card { background: #22222b; margin: 15px; padding: 20px; border-radius: 8px; }
        .card h2 { margin: 0 0 15px 0; font-size: 16px; color: #ffffff; border-left: 4px solid #ff3366; padding-left: 8px; }
        .filter-zone { display: flex; gap: 10px; margin-top: 10px; }
        .filter-select { flex: 1; background: #2a2a35; border: 1px solid #ff3366; color: #ffffff; padding: 8px; border-radius: 4px; font-size: 14px; outline: none; }
        .data-row { margin: 10px 0; font-size: 14px; color: #aaaaaa; line-height: 1.5; }
        .data-val { color: #ffffff; font-weight: bold; float: right; text-align: right; max-width: 60%; }
        .clear { clear: both; }
        .bar-bg { background: #3a3a4a; width: 100%; height: 12px; border-radius: 6px; margin-top: 8px; overflow: hidden; }
        .bar-fill { background: #00ffcc; height: 100%; width: 0%; transition: width 0.6s ease; }
        .nav-link { display: block; text-align: center; color: #ff3366; font-size: 16px; font-weight: bold; margin: 15px; text-decoration: none; border: 1px solid #ff3366; padding: 12px; border-radius: 6px; background: rgba(255,51,102,0.05); }
        
        .chart-container { position: relative; width: 100%; height: 180px; margin-top: 12px; background: #121216; border-radius: 6px; padding: 6px; box-sizing: border-box; border: 1px solid #3a3a4a; }
        .input-box { background: #16161a; border: 1px solid #ff3366; padding: 10px; width: 100%; box-sizing: border-box; color: #ffffff; font-size: 16px; border-radius: 4px; margin-top: 10px; text-align: center; outline: none; }
        .comment-box { margin: 15px; padding: 20px; border-radius: 8px; border: 1px solid #ff3366; background: #2d1a1e; transition: all 0.3s ease; }
        .comment-box.unlocked { border-color: #00ffcc; background: #1b2a22; }
        .comment-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .comment-text { font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <h1>Kit Coach 智慧數據看板</h1>
        <p>慢慢跑團 遠程智慧特訓平台 v39.8-StrictFixed</p>
    </div>

    <a href="submit.html" class="nav-link">📝 前往上報今日特訓功課 ➔</a>

    <div class="card">
        <h2>📊 跑手雲端歷史紀錄讀取</h2>
        <div class="filter-zone">
            <select id="filter-name" class="filter-select"><option value="">讀取跑手中...</option></select>
            <select id="filter-week" class="filter-select"><option value="">選擇週數...</option></select>
        </div>
        
        <div class="chart-container">
            <canvas id="bioMetricsChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="paceMetricsChart"></canvas>
        </div>

        <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 15px 0;">
        <div class="data-row">特訓路線 / 地名定位 <span id="val-location" class="data-val" style="color: #00ffcc;"></span></div>
        <div class="data-row">訓練日期 <span id="val-date" class="data-val">--</span></div>
        <div class="data-row">長跑距離 <span id="val-distance" class="data-val">請選取上方篩選數據</span></div>
        <div class="data-row">爬升海拔 <span id="val-climb" class="data-val">--</span></div>
        <div class="data-row">長跑時間 <span id="val-time" class="data-val">--</span></div>
        <div class="data-row" style="color: #00ffcc; font-weight: bold;">總平均耗力指數 (EPH) <span id="val-eph" class="data-val" style="color: #00ffcc;">--</span></div>
        <div class="data-row">平均步頻 <span id="val-cadence" class="data-val">--</span></div>
        <div class="data-row">平均步距 <span id="val-stride" class="data-val">--</span></div>
        <div class="data-row" style="margin-top: 15px;">
            <div>平均心率 <span id="val-hr" class="data-val">--</span></div>
            <div class="clear"></div>
            <div class="bar-bg"><div id="hr-bar" class="bar-fill"></div></div>
        </div>
        <hr style="border: 0; border-top: 1px solid #3a3a4a; margin: 15px 0;">
        
        <div class="data-row">身體風險體感 <span id="val-risk" class="data-val" style="font-size:12px; color:#ffb703;">--</span></div>
        <div class="data-row" style="color: #00ffcc; font-weight: bold;">雲端同步分段EPH <span id="val-seg-eph" class="data-val" style="font-size:12px; color:#00ffcc;">--</span></div>
        <div class="data-row">環境天氣 <span id="val-weather" class="data-val">--</span></div>
        <div class="data-row">補給問題 <span id="val-supply" class="data-val">--</span></div>
    </div>

    <div class="card">
        <h2>🔐 步驟三：解鎖教練專屬週方針</h2>
        <input type="password" id="pwd-input" class="input-box" placeholder="點擊打入密碼解鎖評語" maxlength="4">
    </div>

    <div id="lock-zone" class="comment-box">
        <div id="lock-title" class="comment-title" style="color: #ff4d4d;">🔒 遠程評語尚未解鎖</div>
        <div id="lock-content" class="comment-text" style="color: rgba(255,255,255,0.6);">
            【系統提示】：請選擇跑手與週數，並打入密碼解鎖本週核心特訓戰術方針！
        </div>
    </div>
</div>

<script>
    const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxdxSecRK-c5JnXNdMqt__8HjZI1mZFP8gP7YF2MSGDQRfj_fheZZnDRih-95CRCbnN3QG7XrJMthY/pub?gid=375017450&single=true&output=csv";
    let allRecords = [];
    let bioChartInstance = null;
    let paceChartInstance = null;

    function cleanStringToHours(timeStr) {
        if (!timeStr) return 0;
        const match = timeStr.match(/([0-9]{1,2}):([0-9]{2}):([0-9]{2})/);
        if (match) {
            return parseInt(match[1]) + (parseInt(match[2]) / 60) + (parseInt(match[3]) / 3600);
        }
        return 6.8; 
    }

    function parseStandardCSV(csvText) {
        let lines = []; let currentLine = []; let currentCell = ''; let inQuotes = false;
        let normalized = csvText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        for (let i = 0; i < normalized.length; i++) {
            let c = normalized[i];
            if (c === '"') { inQuotes = !inQuotes; }
            else if (c === ',' && !inQuotes) { currentLine.push(currentCell.trim()); currentCell = ''; }
            else if (c === '\n' && !inQuotes) { currentLine.push(currentCell.trim()); lines.push(currentLine); currentLine = []; currentCell = ''; }
            else { currentCell += c; }
        }
        if (currentCell || currentLine.length > 0) { currentLine.push(currentCell.trim()); lines.push(currentLine); }
        return lines;
    }

    async function fetchAllData() {
        try {
            const response = await fetch(googleSheetCsvUrl + "&cachebust=" + new Date().getTime());
            const data = await response.text();
            const lines = parseStandardCSV(data);
            if(!lines || lines.length <= 1) return;

            const headers = lines[0];
            let idxName = headers.findIndex(h => h.includes("姓名") || h.includes("跑手") || h.includes("Name") || h.includes("學員"));
            let idxWeek = headers.findIndex(h => h.includes("週") || h.includes("Week"));
            let idxDist = headers.findIndex(h => h.includes("距離") || h.includes("Distance") || h.includes("km"));
            let idxClimb = headers.findIndex(h => h.includes("爬升") || h.includes("Climb") || h.includes("海拔"));
            let idxTime = headers.findIndex(h => h.includes("時間") || h.includes("Time"));
            let idxCadence = headers.findIndex(h => h.includes("步頻") || h.includes("Cadence"));
            let idxHr = headers.findIndex(h => h.includes("心率") || h.includes("HR"));
            let idxStride = headers.findIndex(h => h.includes("步距") || h.includes("Stride"));
            let idxRisk = headers.findIndex(h => h.includes("風險") || h.includes("身體"));
            let idxWeather = headers.findIndex(h => h.includes("天氣") || h.includes("環境"));
            let idxSupply = headers.findIndex(h => h.includes("補給") || h.includes("Supply"));
            let idxLoc = headers.findIndex(h => h.includes("地名") || h.includes("路線") || h.includes("Location"));
            
            let idxSegEph = headers.findIndex(h => h.includes("分段EPH"));
            let idxTrajectory = headers.findIndex(h => h.includes("高度軌跡"));

            if(idxName === -1) idxName = 1; if(idxWeek === -1) idxWeek = 2; if(idxDist === -1) idxDist = 3; if(idxClimb === -1) idxClimb = 4;
            if(idxTime === -1) idxTime = 5; if(idxCadence === -1) idxCadence = 6; if(idxHr === -1) idxHr = 7; if(idxStride === -1) idxStride = 8;

            allRecords = []; let names = new Set(); let weeks = new Set();
            for(let i = 1; i < lines.length; i++) {
                let row = lines[i];
                if(row && row.length > Math.max(idxName, idxWeek) && row[idxName] && row[idxName].trim() !== "") { 
                    allRecords.push({ 
                        timestamp: row[0]||"--", name: row[idxName].trim(), week: row[idxWeek].trim(), distance: row[idxDist]||"0", 
                        climb: row[idxClimb]||"0", time: row[idxTime]||"--", cadence: row[idxCadence]||"0", 
                        hr: row[idxHr]||"0", stride: row[idxStride]||"0", risk: row[idxRisk]||"良好", 
                        weather: row[idxWeather]||"正常", supply: row[idxSupply]||"正常",
                        location: (idxLoc !== -1 && row[idxLoc]) ? row[idxLoc] : "",
                        segEph: (idxSegEph !== -1 && row[idxSegEph]) ? row[idxSegEph] : "",
                        trajectory: (idxTrajectory !== -1 && row[idxTrajectory]) ? row[idxTrajectory] : ""
                    });
                    names.add(row[idxName].trim()); weeks.add(row[idxWeek].trim());
                }
            }

            const nameSelect = document.getElementById('filter-name'); const weekSelect = document.getElementById('filter-week');
            nameSelect.innerHTML = '<option value="">選擇跑手...</option>';
            names.forEach(n => { nameSelect.innerHTML += '<option value="' + n + '">' + n + '</option>'; });
            weekSelect.innerHTML = '<option value="">選擇週數...</option>';
            Array.from(weeks).sort().forEach(w => { weekSelect.innerHTML += '<option value="' + w + '">' + w + '</option>'; });
            
            if(allRecords && allRecords.length > 0) { 
                const last = allRecords[allRecords.length - 1]; 
                if(last) { nameSelect.value = last.name; weekSelect.value = last.week; updateDisplay(last.name, last.week); }
            }
        } catch (error) { console.error(error); }
    }

    function updateDisplay(selectedName, selectedWeek) {
        if(!allRecords || allRecords.length === 0) return;
        const matched = allRecords.find(r => r.name === selectedName && r.week === selectedWeek);
        if (matched) {
            document.getElementById('val-date').innerText = matched.timestamp.split(' ')[0] || "--"; 
            document.getElementById('val-distance').innerText = matched.distance + " km"; 
            document.getElementById('val-climb').innerText = matched.climb + " 米"; 
            document.getElementById('val-time').innerText = matched.time; 
            document.getElementById('val-cadence').innerText = matched.cadence + " spm"; 
            document.getElementById('val-stride').innerText = matched.stride + " m";
            document.getElementById('val-hr').innerText = matched.hr + " bpm";
            document.getElementById('val-weather').innerText = matched.weather; 
            document.getElementById('val-supply').innerText = matched.supply;
            document.getElementById('val-location').innerText = matched.location ? "📍 " + matched.location : "";
            document.getElementById('val-risk').innerText = matched.risk;
            
            let distNum = parseFloat(matched.distance) || 0; 
            let climbNum = parseFloat(matched.climb) || 0; 
            let hoursNum = cleanStringToHours(matched.time);
            
            // 💡 徹底修正變數拼寫錯誤（統一全小寫開頭變數，拒絕大小寫模糊衝突）
            let rawExcelEphStr = matched.segEph || "";
            document.getElementById('val-seg-eph').innerText = rawExcelEphStr ? rawExcelEphStr : "等待手錶原始檔同步...";
            
            let wEphVal = 0; let mEphVal = 0; let tEphVal = 0;
            if (rawExcelEphStr) {
                let matchW = rawExcelEphStr.match(/熱身[:：]\s*([0-9\.]+)/);
                let matchM = rawExcelEphStr.match(/攻坡[:：]\s*([0-9\.]+)/);
                let matchT = rawExcelEphStr.match(/落山[:：]\s*([0-9\.]+)/) || rawExcelEphStr.match(/下坡[:：]\s*([0-9\.]+)/);
                
                if(matchW) wEphVal = parseFloat(matchW[1]);
                if(matchM) mEphVal = parseFloat(matchM[1]);
                if(matchT) tEphVal = parseFloat(matchT[1]);
            }
            
            if (hoursNum > 0) { 
                document.getElementById('val-eph').innerText = ((distNum + (climbNum / 100)) / hoursNum).toFixed(2) + " EP/小時"; 
            } else { 
                document.getElementById('val-eph').innerText = "--"; 
            }
            
            let hrNum = parseInt(matched.hr) || 142;
            let cadenceNum = parseInt(matched.cadence) || 175;
            const hrBar = document.getElementById('hr-bar'); if(hrBar) { let pct = Math.min(100, Math.max(10, (hrNum / 200) * 100)); hrBar.style.width = pct + "%"; hrBar.style.backgroundColor = hrNum <= 145 ? "#00ffcc" : "#ff9900"; }
            
            try {
                let step1 = (distNum * 0.2).toFixed(1);
                let step2 = (distNum * 0.7).toFixed(1);
                let xLabels = ['0 km', step1 + ' km\n(熱身段)', step2 + ' km\n(主攻坡)', distNum + ' km\n(終點)'];
                
                let bgElevation = [0, Math.round(climbNum * 0.15), climbNum, Math.round(climbNum * 0.05)];
                if (matched.trajectory) {
                    let parsedArray = matched.trajectory.split(',').map(Number);
                    if (parsedArray.length >= 4) { bgElevation = parsedArray; }
                }

                let dynamicHr = [hrNum - 15, hrNum - 3, hrNum, hrNum - 10];
                let dynamicPower = [115, Math.round(130 + (climbNum * 0.01)), Math.round(155 + (climbNum * 0.02)), 100];
                let dynamicPace = [5.6, 5.1, Math.min(12, parseFloat((5.4 + (climbNum / 750)).toFixed(1))), 4.7];

                if (bioChartInstance) { bioChartInstance.destroy(); bioChartInstance = null; }
                if (paceChartInstance) { paceChartInstance.destroy(); paceChartInstance = null; }

                let ctxBio = document.getElementById('bioMetricsChart').getContext('2d');
                bioChartInstance = new Chart(ctxBio, {
                    type: 'line',
                    data: {
                        labels: xLabels,
                        datasets: [
                            { label: '心率 (bpm)', data: dynamicHr, borderColor: '#ff3366', fill: false, tension: 0.2, yAxisID: 'yBio' },
                            { label: '步頻 (spm)', data: [cadenceNum - 5, cadenceNum, cadenceNum + 3, cadenceNum - 1], borderColor: '#ffb703', fill: false, tension: 0.2, yAxisID: 'yBio' },
                            { label: '功率 (W)', data: dynamicPower, borderColor: '#bc00dd', fill: false, tension: 0.2, yAxisID: 'yPower' },
                            { label: `真實攀升背景 (${climbNum}m)`, data: bgElevation, borderColor: 'rgba(0, 255, 204, 0.12)', backgroundColor: 'rgba(0, 255, 204, 0.02)', fill: true, tension: 0.3, pointRadius: 0, yAxisID: 'yElevation' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: true, labels: { color: '#ffffff', boxWidth: 8, font: { size: 9 } } } },
                        scales: {
                            yBio: { type: 'linear', display: true, position: 'left', grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { font: { size: 9 } } },
                            yPower: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 9 } } },
                            yElevation: { type: 'linear', display: false, min: 0 }
                        }
                    }
                });

                let ctxPace = document.getElementById('paceMetricsChart').getContext('2d');
                paceChartInstance = new Chart(ctxPace, {
                    type: 'line',
                    data: {
                        labels: xLabels,
                        datasets: [
                            { label: '即時配速 (min/km)', data: dynamicPace, borderColor: '#3a86ff', fill: false, tension: 0.3, yAxisID: 'yPace' },
                            { label: '分段 EPH 效率', data: [wEphVal * 0.6, wEphVal, mEphVal, tEphVal], borderColor: '#00ffcc', fill: false, tension: 0.2, yAxisID: 'yEph' },
                            { label: `真實攀升背景 (${climbNum}m)`, data: bgElevation, borderColor: 'rgba(0, 255, 204, 0.12)', backgroundColor: 'rgba(0, 255, 204, 0.02)', fill: true, tension: 0.3, pointRadius: 0, yAxisID: 'yElevation' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: true, labels: { color: '#ffffff', boxWidth: 8, font: { size: 9 } } } },
                        scales: {
                            yPace: { type: 'linear', display: true, position: 'left', reversed: true, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { font: { size: 9 } } },
                            yEph: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 9 } } },
                            yElevation: { type: 'linear', display: false, min: 0 }
                        }
                    }
                });

            } catch(chartErr) { console.error(chartErr); }
            checkPassword();
        }
    }

    function checkPassword() {
        const pwd = document.getElementById('pwd-input').value; const zone = document.getElementById('lock-zone');
        const title = document.getElementById('lock-title'); const content = document.getElementById('lock-content');
        const name = document.getElementById('filter-name').value; const week = document.getElementById('filter-week').value;
        if (!name || !week) return;
        if (pwd === "8888") {
            zone.className = "comment-box unlocked";
            title.innerText = "🟢 [" + name + "] 第 " + week + " 週・教練核心戰術方針已解鎖"; title.style.color = "#00ffcc";
            content.innerHTML = "<strong>【本週特訓方針】：</strong> 長課表現穩定。後半程需特別留意步距維持，切勿因疲勞導致推推力道下降。下週將針對主攻坡段進行專屬耐力疊加，維持補給節奏，繼續加油！"; content.style.color = "#ffffff";
        } else {
            zone.className = "comment-box"; title.innerText = "🔒 遠程評語尚未解鎖"; title.style.color = "#ff4d4d";
            content.innerText = "【系統提示】：請選擇跑手與週數，並打入密碼解鎖本週核心特訓戰術方針！"; content.style.color = "rgba(255,255,255,0.6)";
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('filter-name').addEventListener('change', (e) => { updateDisplay(e.target.value, document.getElementById('filter-week').value); });
        document.getElementById('filter-week').add
