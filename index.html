<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ki Coach 遠程特訓平台</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }
        /* 模擬手機外殼容器 */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 892px;
            background: #1e1e1e;
            position: relative;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* 隱藏但用作原生互動的輸入框（方便手機彈出鍵盤） */
        #hidden-input {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            z-index: -1;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <canvas id="appCanvas"></canvas>
    <input type="text" id="hidden-input" maxlength="6" placeholder="密碼">
</div>

<script>
    const canvas = document.getElementById('appCanvas');
    const ctx = canvas.getContext('2d');
    const hiddenInput = document.getElementById('hidden-input');

    // 模擬從 Google Sheets 獲取的 Kit Week 14 真實數據（稍後可一秒綁定 CSV）
    const trainData = {
        name: "Kit",
        week: "Week 14",
        distance: 10,
        time: "0:10:05",
        hr: 140,
        cadence: 180,
        stride: 112,
        risk: "良好 (狀態平穩，無傷痛)",
        weather: "正常 (天氣涼爽 / 室內冷氣 / 體感舒適)"
    };

    let passwordText = "";
    let isUnlocked = false;

    // 定義高清 Canvas 分辨率 (Retina 螢幕優化)
    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    // 密碼判斷邏輯 (VALUE(code) + 888 === 2122)
    function checkPassword(pass) {
        const codeNum = parseInt(pass);
        if (!isNaN(codeNum) && codeNum + 888 === 2122) {
            isUnlocked = true;
        } else {
            isUnlocked = false;
        }
    }

    // Canvas 多行文字自動換行渲染器
    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        const words = text.split('');
        let line = '';
        let currentY = y;

        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n];
            let metrics = ctx.measureText(testLine);
            let testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                ctx.fillText(line, x, currentY);
                line = words[n];
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, x, currentY);
        return currentY;
    }

    // 主渲染循環 (Render Loop)
    function render() {
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;

        // 1. 背景與頂欄
        ctx.fillStyle = '#16161a';
        ctx.fillRect(0, 0, w, h);

        ctx.fillStyle = '#ff3366';
        ctx.fillRect(0, 0, w, 90);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px system-ui';
        ctx.fillText(`${trainData.name} - ${trainData.week} 特訓簡報`, 20, 45);
        ctx.font = '14px system-ui';
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillText('毅行者遠程智慧特訓平台 v2.0', 20, 70);

        // 2. 核心數據卡片
        let startY = 120;
        ctx.fillStyle = '#22222b';
        ctx.fillRect(15, startY, w - 30, 210);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 16px system-ui';
        ctx.fillText('🏃 當週長跑核心數據', 30, startY + 30);

        ctx.font = '14px system-ui';
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText(`長跑距離: ${trainData.distance} km`, 30, startY + 65);
        ctx.fillText(`長跑時間: ${trainData.time}`, 30, startY + 90);
        ctx.fillText(`平均步幅: ${trainData.stride} m`, 30, startY + 115);

        // 3. 視覺化組件：步頻儀表板提示 (Cadence)
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText(`平均步頻: ${trainData.cadence} spm`, 30, startY + 145);
        if (trainData.cadence >= 180) {
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 14px system-ui';
            ctx.fillText('✓ 完美高效步頻', 180, startY + 145);
        }

        // 4. 視覺化組件：心率進度條 (Heart Rate Zone)
        ctx.font = '14px system-ui';
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText(`平均心率: ${trainData.hr} bpm`, 30, startY + 180);
        
        // 畫心率條背景
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(160, startY + 170, 120, 12);
        // 根據心率高低渲染顏色（模擬 Zone 2 內耗優化）
        ctx.fillStyle = trainData.hr <= 145 ? '#00ffcc' : '#ff9900'; 
        ctx.fillRect(160, startY + 170, (trainData.hr / 200) * 120, 12);

        // 5. 狀態與天氣
        ctx.fillStyle = '#22222b';
        ctx.fillRect(15, startY + 230, w - 30, 90);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px system-ui';
        ctx.fillText('🩺 跑手身體與外在環境', 30, startY + 260);
        ctx.font = '13px system-ui';
        ctx.fillStyle = '#ccff00';
        ctx.fillText(`身體風險: ${trainData.risk}`, 30, startY + 285);
        ctx.fillStyle = '#00e5ff';
        ctx.fillText(`環境天氣: ${trainData.weather}`, 30, startY + 305);

        // 6. 教練解鎖密碼交互區
        let pwdY = startY + 340;
        ctx.fillStyle = '#2a2a35';
        ctx.fillRect(15, pwdY, w - 30, 80);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px system-ui';
        ctx.fillText('🔐 教練專屬解鎖密碼輸入區', 30, pwdY + 30);

        // 畫密碼輸入框
        ctx.fillStyle = '#16161a';
        ctx.strokeStyle = '#ff3366';
        ctx.lineWidth = 1;
        ctx.fillRect(30, pwdY + 42, 120, 26);
        ctx.strokeRect(30, pwdY + 42, 120, 26);

        // 顯示目前打入嘅密碼（或星號）
        ctx.fillStyle = '#ffffff';
        ctx.font = '14px monospace';
        let displayPass = passwordText.replace(/./g, '*');
        ctx.fillText(passwordText ? displayPass : '點擊輸入密碼', 40, pwdY + 60);

        // 7. 動態評語解鎖看板（終極大公式前端渲染）
        let commentY = pwdY + 100;
        ctx.fillStyle = isUnlocked ? '#1b2a22' : '#2d1a1e';
        ctx.strokeStyle = isUnlocked ? '#00ffcc' : '#ff3366';
        ctx.fillRect(15, commentY, w - 30, 200);
        ctx.strokeRect(15, commentY, w - 30, 200);

        if (isUnlocked) {
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 16px system-ui';
            ctx.fillText('🔓 Ki Coach 硬核特訓方針已解鎖：', 30, commentY + 35);

            ctx.fillStyle = '#ffffff';
            ctx.font = '14px system-ui';
            // 這裡模擬解鎖後，背景 Excel 大公式噴出來的長篇策略
            const coachComment = "根據本週數據，Kit 的步頻完美保持在 180spm，有氧心肺效率極高，處於低內耗的 Zone 2 黃金跑姿。目前毫無傷痛風險。下週起，由於進入 Week 15 特訓中段，強度目標將提升 15%，長跑里數正式加碼至 25K。請密切留意夜間靜止心率，防止過度疲勞！";
            wrapText(ctx, coachComment, 30, commentY + 65, w - 60, 22);
        } else {
            ctx.fillStyle = '#ff4d4d';
            ctx.font = 'bold 16px system-ui';
            ctx.fillText('🔒 遠程評語尚未解鎖', 30, commentY + 45);

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '13px system-ui';
            const lockPrompt = "【系統提示】：教練正在為你當週的訓練數據、有氧心肺效率與跑姿經濟性進行深度分析，評語尚未解鎖。請等待教練親自輸入密碼發放專屬方針！";
            wrapText(ctx, lockPrompt, 30, commentY + 80, w - 60, 20);
        }

        requestAnimationFrame(render);
    }

    // 處理手機點擊與觸發原生鍵盤
    window.addEventListener('resize', resizeCanvas);
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        // 判斷點擊位置是否在「密碼輸入框」範圍內
        let pwdY = 120 + 340; 
        if (clickX >= 30 && clickX <= 150 && clickY >= pwdY + 42 && clickY <= pwdY + 68) {
            hiddenInput.focus();
        }
    });

    // 監聽鍵盤輸入
    hiddenInput.addEventListener('input', (e) => {
        passwordText = e.target.value;
        checkPassword(passwordText);
    });

    // 啟動 App
    resizeCanvas();
    render();
</script>

</body>
</html>
